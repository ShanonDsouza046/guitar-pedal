<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STOMP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #1a1208;
    --panel: #231a0e;
    --metal: #2e2418;
    --accent: #e87c1e;
    --accent2: #f5a623;
    --led: #ff4444;
    --led-on: #ff6b6b;
    --text: #d4a96a;
    --screw: #3a2e1e;
    --groove: #151008;
    --shine: rgba(255,200,100,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Brushed metal texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .pedal-body {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: linear-gradient(160deg, #2a1f10 0%, #1a1208 40%, #231a0e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 30px;
    position: relative;
    border-left: 2px solid #3a2a18;
    border-right: 2px solid #3a2a18;
  }

  /* Corner screws */
  .screw {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #5a4a30, #2a2010);
    border: 1px solid #4a3820;
    box-shadow: inset 0 1px 2px rgba(255,200,100,0.1), 0 2px 4px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .screw::after {
    content: '';
    width: 12px;
    height: 1.5px;
    background: #6a5a3a;
    transform: rotate(45deg);
    box-shadow: 0 0 0 0.5px #6a5a3a;
    border-radius: 1px;
  }
  .screw-tl { top: 12px; left: 12px; }
  .screw-tr { top: 12px; right: 12px; }
  .screw-bl { bottom: 12px; left: 12px; }
  .screw-br { bottom: 12px; right: 12px; }

  /* Header */
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(232,124,30,0.4), 0 2px 0 rgba(0,0,0,0.8);
    margin-top: 10px;
    margin-bottom: 2px;
  }
  .brand-sub {
    font-size: 10px;
    letter-spacing: 4px;
    color: #6a5a3a;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  /* Disk / Spinner */
  .disk-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 10px 0 20px;
  }

  .disk-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #3a2e1e, #1a1208);
    border: 3px solid #3a2a18;
    box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 0 1px #4a3820, inset 0 0 20px rgba(0,0,0,0.5);
  }

  .disk-vinyl {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #1a1008, #252010, #1a1008, #201808, #1a1008,
      #252010, #1a1008, #201808, #1a1008, #252010,
      #1a1008, #201808, #1a1008
    );
    transition: transform 0.1s linear;
    overflow: hidden;
  }
  .disk-vinyl::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: repeating-radial-gradient(
      circle at center,
      transparent 0px,
      transparent 6px,
      rgba(255,160,50,0.05) 6px,
      rgba(255,160,50,0.05) 7px
    );
  }

  .disk-label {
    position: absolute;
    inset: 30%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #2e2010, #1a1008);
    border: 1px solid #3a2a18;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }

  .disk-label .track-name {
    font-size: 7px;
    color: var(--accent);
    text-align: center;
    padding: 0 4px;
    max-width: 50px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .disk-center-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #6a5a3a, #2a2010);
    border: 1px solid #4a3820;
  }

  .disk-shine {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,200,100,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  /* VU-style progress bar */
  .progress-bar-wrap {
    width: 90%;
    height: 6px;
    background: var(--groove);
    border-radius: 3px;
    margin-bottom: 16px;
    overflow: hidden;
    border: 1px solid #2a2010;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #cc5500, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s linear;
    box-shadow: 0 0 6px rgba(232,124,30,0.6);
  }

  /* Main stomp button — wide flat pedal */
  .stomp-btn {
    width: 92%;
    max-width: 420px;
    height: 110px;
    border-radius: 18px;
    position: relative;
    cursor: pointer;
    margin: 8px 0 20px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    /* 3D lift effect via layered box-shadows */
    filter: drop-shadow(0 10px 0px #0d0805) drop-shadow(0 14px 18px rgba(0,0,0,0.7));
  }

  .stomp-btn-outer {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(170deg, #3e2e18 0%, #2a1e0e 50%, #1e1408 100%);
    border: 2px solid #4a3820;
    border-bottom: 2px solid #2a1e0e;
    box-shadow:
      inset 0 2px 0 rgba(255,200,100,0.12),
      inset 0 -2px 6px rgba(0,0,0,0.5),
      inset 4px 0 8px rgba(0,0,0,0.2),
      inset -4px 0 8px rgba(0,0,0,0.2);
    transition: transform 0.07s ease, filter 0.07s ease;
    /* grip texture lines */
    background-image:
      linear-gradient(170deg, #3e2e18 0%, #2a1e0e 50%, #1e1408 100%),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 18px,
        rgba(0,0,0,0.15) 18px,
        rgba(0,0,0,0.15) 20px
      );
    background-blend-mode: multiply;
  }

  .stomp-btn:active {
    filter: drop-shadow(0 4px 0px #0d0805) drop-shadow(0 6px 10px rgba(0,0,0,0.7));
  }

  .stomp-btn:active .stomp-btn-outer {
    transform: translateY(6px);
  }

  .stomp-btn-inner {
    position: absolute;
    inset: 10px 14px;
    border-radius: 12px;
    background: radial-gradient(ellipse at 50% 30%, #3a2a18, #1a1008);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: row;
    gap: 16px;
    border: 1px solid #2a1e0e;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
  }

  .stomp-icon {
    font-size: 36px;
    line-height: 1;
    transition: transform 0.1s;
  }

  .stomp-right {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
  }

  .stomp-btn-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0.85;
    line-height: 1;
  }

  /* LED */
  .led {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #660000, #330000);
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    transition: all 0.15s;
    margin-bottom: 4px;
  }
  .led.on {
    background: radial-gradient(circle at 35% 35%, #ff9999, #ff3333);
    box-shadow: 0 0 10px rgba(255,60,60,0.8), 0 0 20px rgba(255,60,60,0.4);
  }

  /* Track Slots */
  .tracks-section {
    width: 100%;
    margin-top: 8px;
  }

  .tracks-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #5a4a2a;
    text-align: center;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .track-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    width: 100%;
    padding: 0 4px;
  }

  .track-btn {
    flex: 1 1 calc(50% - 10px);
    min-width: 120px;
    max-width: calc(50% - 5px);
    height: 72px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    position: relative;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(160deg, #2e2418, #1a1208);
    box-shadow: 0 6px 14px rgba(0,0,0,0.7), 0 0 0 1px #3a2a18, inset 0 1px 0 rgba(255,200,100,0.05);
    transition: transform 0.08s, box-shadow 0.08s, background 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    overflow: hidden;
    padding: 0 10px;
  }

  .track-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.7), 0 0 0 1px #3a2a18, inset 0 1px 0 rgba(255,200,100,0.05);
  }

  .track-btn.active {
    background: linear-gradient(160deg, #3a2810, #251808);
    box-shadow: 0 4px 10px rgba(0,0,0,0.7), 0 0 0 1px #5a3a18, 0 0 12px rgba(232,124,30,0.2), inset 0 1px 0 rgba(255,200,100,0.1);
  }

  .track-btn .track-led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #440000, #220000);
    transition: all 0.15s;
    position: absolute;
    top: 10px;
    right: 10px;
    flex-shrink: 0;
  }

  .track-btn.active .track-led {
    background: radial-gradient(circle at 35% 35%, #ff9999, #ff4444);
    box-shadow: 0 0 6px rgba(255,60,60,0.8);
  }

  .track-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: #5a4a2a;
    text-align: center;
    position: absolute;
    top: 10px;
    left: 10px;
  }

  .track-btn.active .track-num {
    color: var(--accent);
  }

  .track-btn-name {
    font-size: 11px;
    color: var(--text);
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.5px;
    padding: 0 12px;
  }

  .track-btn.active .track-btn-name {
    color: var(--accent2);
  }

  /* Add track button */
  .add-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 2px dashed #3a2a18;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 3px;
    transition: all 0.2s;
    touch-action: manipulation;
    align-self: center;
    flex-shrink: 0;
  }

  .add-btn:hover, .add-btn:active {
    border-color: var(--accent);
    background: rgba(232,124,30,0.05);
  }

  .add-btn-icon {
    font-size: 22px;
    color: #5a4a2a;
    line-height: 1;
    transition: color 0.2s;
  }
  .add-btn:hover .add-btn-icon, .add-btn:active .add-btn-icon {
    color: var(--accent);
  }

  .add-btn-text {
    font-size: 8px;
    letter-spacing: 1px;
    color: #5a4a2a;
    text-transform: uppercase;
  }

  /* Track row wrapper to include add button */
  .tracks-row-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 0 4px;
  }

  /* Hidden file input */
  #fileInput { display: none; }

  /* Divider */
  .divider {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3a2a18, transparent);
    margin: 18px 0 12px;
  }

  /* Time display */
  .time-display {
    font-size: 12px;
    color: #5a4a2a;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .time-display span {
    color: var(--accent);
  }

  /* Spinning animation */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .disk-vinyl.spinning {
    animation: spin 3s linear infinite;
  }

  /* No tracks hint */
  .no-tracks-hint {
    font-size: 10px;
    letter-spacing: 2px;
    color: #3a2a18;
    text-align: center;
    padding: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="pedal-body">
  <div class="screw screw-tl"></div>
  <div class="screw screw-tr"></div>
  <div class="screw screw-bl"></div>
  <div class="screw screw-br"></div>

  <div class="brand">STOMP</div>
  <div class="brand-sub">Floor Loop Player</div>

  <!-- Disk -->
  <div class="disk-container">
    <div class="disk-outer"></div>
    <div class="disk-vinyl" id="diskVinyl">
      <div class="disk-label">
        <div class="track-name" id="diskTrackName">—</div>
        <div class="disk-center-dot"></div>
      </div>
    </div>
    <div class="disk-shine"></div>
  </div>

  <!-- Time -->
  <div class="time-display"><span id="timeElapsed">0:00</span> / <span id="timeDuration">0:00</span></div>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <!-- Stomp Play/Pause -->
  <div class="stomp-btn" id="stompBtn">
    <div class="stomp-btn-outer"></div>
    <div class="stomp-btn-inner">
      <div class="stomp-icon" id="stompIcon">▶</div>
      <div class="stomp-right">
        <div class="led" id="mainLed"></div>
        <div class="stomp-btn-label" id="stompLabel">PLAY</div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Tracks -->
  <div class="tracks-section">
    <div class="tracks-label">— Tracks —</div>
    <div class="tracks-row-wrap" id="tracksWrap">
      <div class="no-tracks-hint" id="noTracksHint">Tap + to add tracks</div>
      <button class="add-btn" id="addBtn">
        <span class="add-btn-icon">+</span>
        <span class="add-btn-text">Add</span>
      </button>
    </div>
  </div>

<input type="file" id="fileInput" multiple></div>

<script>
  const audio = new Audio();
  audio.loop = false;

  let tracks = [];
  let currentTrack = -1;
  let isPlaying = false;

  const stompBtn = document.getElementById('stompBtn');
  const stompIcon = document.getElementById('stompIcon');
  const stompLabel = document.getElementById('stompLabel');
  const mainLed = document.getElementById('mainLed');
  const diskVinyl = document.getElementById('diskVinyl');
  const diskTrackName = document.getElementById('diskTrackName');
  const progressFill = document.getElementById('progressFill');
  const timeElapsed = document.getElementById('timeElapsed');
  const timeDuration = document.getElementById('timeDuration');
  const tracksWrap = document.getElementById('tracksWrap');
  const addBtn = document.getElementById('addBtn');
  const fileInput = document.getElementById('fileInput');
  const noTracksHint = document.getElementById('noTracksHint');

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function updateUI() {
    stompIcon.textContent = isPlaying ? '⏸' : '▶';
    stompLabel.textContent = isPlaying ? 'PAUSE' : 'PLAY';
    mainLed.classList.toggle('on', isPlaying);
    if (isPlaying) {
      diskVinyl.classList.add('spinning');
    } else {
      diskVinyl.classList.remove('spinning');
    }

    document.querySelectorAll('.track-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentTrack);
    });

    if (currentTrack >= 0) {
      diskTrackName.textContent = tracks[currentTrack].name;
    } else {
      diskTrackName.textContent = '—';
    }
  }

  function loadTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    currentTrack = index;
    audio.src = tracks[index].url;
    audio.load();
    timeDuration.textContent = '0:00';
    timeElapsed.textContent = '0:00';
    progressFill.style.width = '0%';
    updateUI();
  }

  function playPause() {
    if (currentTrack < 0 && tracks.length > 0) {
      loadTrack(0);
    }
    if (currentTrack < 0) return;

    if (isPlaying) {
      audio.pause();
      isPlaying = false;
    } else {
      audio.play().then(() => {
        isPlaying = true;
        updateUI();
      }).catch(() => {});
      isPlaying = true;
    }
    updateUI();
  }

  stompBtn.addEventListener('click', playPause);

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeElapsed.textContent = fmt(audio.currentTime);
      timeDuration.textContent = fmt(audio.duration);
    }
  });

  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUI();
    // Auto next
    if (currentTrack < tracks.length - 1) {
      loadTrack(currentTrack + 1);
      audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
    }
  });

  addBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^.]+$/, '');
      const idx = tracks.length;
      tracks.push({ name, url });
      addTrackButton(name, idx);
    });
    fileInput.value = '';
    if (currentTrack < 0 && tracks.length > 0) {
      loadTrack(0);
    }
    noTracksHint.style.display = 'none';
  });

  function addTrackButton(name, index) {
    const btn = document.createElement('button');
    btn.className = 'track-btn';
    btn.innerHTML = `
      <div class="track-num">T${index + 1}</div>
      <div class="track-led"></div>
      <div class="track-btn-name">${name}</div>
    `;
    btn.addEventListener('click', () => {
      if (currentTrack === index) {
        playPause();
      } else {
        const wasPlaying = isPlaying;
        if (isPlaying) { audio.pause(); isPlaying = false; }
        loadTrack(index);
        if (wasPlaying) {
          audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
          isPlaying = true;
        }
      }
      updateUI();
    });

    // Insert before add button
    tracksWrap.insertBefore(btn, addBtn);
  }
</script>
</body>
</html>
