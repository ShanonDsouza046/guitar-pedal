<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STOMP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #1a1208;
    --accent: #e87c1e;
    --accent2: #f5a623;
    --text: #d4a96a;
    --groove: #151008;
    --dim: #5a4a2a;
    --border: #3a2a18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 200;
  }

  .pedal-body {
    width: 100vw;
    height: 100dvh;
    background: linear-gradient(150deg, #2a1f10 0%, #1a1208 45%, #231a0e 100%);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 2px solid #3a2a18;
    overflow: hidden;
  }

  /* Screws */
  .screw {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #5a4a30, #2a2010);
    border: 1px solid #4a3820;
    box-shadow: inset 0 1px 2px rgba(255,200,100,0.1), 0 2px 4px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .screw::after {
    content: '';
    width: 11px; height: 1.5px;
    background: #6a5a3a;
    transform: rotate(45deg);
    border-radius: 1px;
  }
  .screw-tl { top: 10px; left: 10px; }
  .screw-tr { top: 10px; right: 10px; }
  .screw-bl { bottom: 10px; left: 10px; }
  .screw-br { bottom: 10px; right: 10px; }

  /* ── TOP SECTION ── */
  .top-section {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    padding: 14px 36px 8px;
    gap: 14px;
    min-height: 0;
  }

  /* Disk column */
  .disk-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    width: 140px;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(232,124,30,0.4);
    line-height: 1;
  }

  .disk-container {
    position: relative;
    width: 110px; height: 110px;
    flex-shrink: 0;
  }
  .disk-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #3a2e1e, #1a1208);
    border: 3px solid #3a2a18;
    box-shadow: 0 0 24px rgba(0,0,0,0.8), 0 0 0 1px #4a3820, inset 0 0 16px rgba(0,0,0,0.5);
  }
  .disk-vinyl {
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #1a1008, #252010, #1a1008, #201808, #1a1008,
      #252010, #1a1008, #201808, #1a1008, #252010,
      #1a1008, #201808, #1a1008
    );
    overflow: hidden;
  }
  .disk-vinyl::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: repeating-radial-gradient(
      circle at center,
      transparent 0px, transparent 5px,
      rgba(255,160,50,0.05) 5px, rgba(255,160,50,0.05) 6px
    );
  }
  .disk-label {
    position: absolute;
    inset: 28%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #2e2010, #1a1008);
    border: 1px solid #3a2a18;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2px;
  }
  .disk-label .track-name {
    font-size: 6px;
    color: var(--accent);
    text-align: center;
    padding: 0 3px;
    max-width: 38px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .disk-center-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #6a5a3a, #2a2010);
    border: 1px solid #4a3820;
  }
  .disk-shine {
    position: absolute; inset: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,200,100,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .disk-vinyl.spinning { animation: spin 3s linear infinite; }

  .progress-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .progress-bar-bg {
    width: 100%;
    height: 5px;
    background: var(--groove);
    border-radius: 3px;
    border: 1px solid #2a2010;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #cc5500, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s linear;
    box-shadow: 0 0 5px rgba(232,124,30,0.6);
  }
  .time-display {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }
  .time-display span { color: var(--accent); }

  .countdown {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-align: center;
    min-height: 13px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .countdown.visible { opacity: 1; }

  /* Tracks column */
  .tracks-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
  }
  .tracks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .tracks-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .add-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px dashed var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1px;
    transition: all 0.2s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .add-btn:active {
    border-color: var(--accent);
    background: rgba(232,124,30,0.05);
  }
  .add-btn-icon { font-size: 16px; color: var(--dim); line-height: 1; }
  .add-btn-text { font-size: 6px; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; }

  .tracks-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 2px;
    min-height: 0;
  }
  .tracks-scroll::-webkit-scrollbar { width: 3px; }
  .tracks-scroll::-webkit-scrollbar-track { background: transparent; }
  .tracks-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-tracks-hint {
    font-size: 9px;
    letter-spacing: 2px;
    color: #2a2010;
    text-align: center;
    padding: 12px 0;
    text-transform: uppercase;
  }

  /* Track buttons — flat pedal style */
  .track-btn {
    width: 100%;
    height: 52px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    position: relative;
    touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
    background: linear-gradient(160deg, #2e2418, #1a1208);
    box-shadow: 0 5px 0 #0d0805, 0 5px 12px rgba(0,0,0,0.6), 0 0 0 1px #3a2a18, inset 0 1px 0 rgba(255,200,100,0.05);
    transition: transform 0.07s, box-shadow 0.07s, background 0.2s;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    flex-shrink: 0;
  }
  .track-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #0d0805, 0 2px 6px rgba(0,0,0,0.6), 0 0 0 1px #3a2a18, inset 0 1px 0 rgba(255,200,100,0.05);
  }
  .track-btn.active {
    background: linear-gradient(160deg, #3a2810, #251808);
    box-shadow: 0 5px 0 #0d0805, 0 5px 12px rgba(0,0,0,0.6), 0 0 0 1px #5a3a18, 0 0 10px rgba(232,124,30,0.15), inset 0 1px 0 rgba(255,200,100,0.1);
  }
  .track-led {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #440000, #220000);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .track-btn.active .track-led {
    background: radial-gradient(circle at 35% 35%, #ff9999, #ff4444);
    box-shadow: 0 0 5px rgba(255,60,60,0.8);
  }
  .track-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    flex-shrink: 0;
    width: 18px;
  }
  .track-btn.active .track-num { color: var(--accent); }
  .track-btn-name {
    font-size: 11px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    letter-spacing: 0.5px;
    text-align: left;
  }
  .track-btn.active .track-btn-name { color: var(--accent2); }

  /* Divider */
  .h-divider {
    width: calc(100% - 40px);
    margin: 0 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3a2a18 20%, #3a2a18 80%, transparent);
    flex-shrink: 0;
  }

  /* ── BOTTOM: two big stomp pedals ── */
  .bottom-section {
    display: flex;
    flex-direction: row;
    gap: 10px;
    padding: 8px 36px 14px;
    flex-shrink: 0;
  }

  .stomp-btn {
    flex: 1;
    height: 90px;
    border-radius: 16px;
    position: relative;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    filter: drop-shadow(0 8px 0px #0d0805) drop-shadow(0 10px 14px rgba(0,0,0,0.7));
    transition: filter 0.07s;
  }
  .stomp-btn:active {
    filter: drop-shadow(0 3px 0px #0d0805) drop-shadow(0 4px 8px rgba(0,0,0,0.7));
  }
  .stomp-btn-outer {
    position: absolute; inset: 0;
    border-radius: 16px;
    background-image:
      linear-gradient(170deg, #3e2e18 0%, #2a1e0e 50%, #1e1408 100%),
      repeating-linear-gradient(
        90deg,
        transparent, transparent 16px,
        rgba(0,0,0,0.12) 16px, rgba(0,0,0,0.12) 18px
      );
    background-blend-mode: multiply;
    border: 2px solid #4a3820;
    box-shadow:
      inset 0 2px 0 rgba(255,200,100,0.1),
      inset 0 -2px 6px rgba(0,0,0,0.4),
      inset 4px 0 8px rgba(0,0,0,0.15),
      inset -4px 0 8px rgba(0,0,0,0.15);
    transition: transform 0.07s;
  }
  .stomp-btn:active .stomp-btn-outer { transform: translateY(7px); }

  .stomp-btn-inner {
    position: absolute;
    inset: 8px 12px;
    border-radius: 10px;
    background: radial-gradient(ellipse at 50% 30%, #3a2a18, #1a1008);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: row;
    gap: 12px;
    border: 1px solid #2a1e0e;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }
  .stomp-icon { font-size: 30px; line-height: 1; }
  .stomp-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .led {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #660000, #330000);
    box-shadow: 0 0 3px rgba(0,0,0,0.5);
    transition: all 0.15s;
  }
  .led.on {
    background: radial-gradient(circle at 35% 35%, #ff9999, #ff3333);
    box-shadow: 0 0 8px rgba(255,60,60,0.8), 0 0 16px rgba(255,60,60,0.4);
  }
  .stomp-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0.85;
    line-height: 1;
  }

  #fileInput { display: none; }
</style>
</head>
<body>
<div class="pedal-body">
  <div class="screw screw-tl"></div>
  <div class="screw screw-tr"></div>
  <div class="screw screw-bl"></div>
  <div class="screw screw-br"></div>

  <div class="top-section">

    <!-- Disk col -->
    <div class="disk-col">
      <div class="brand">STOMP</div>
      <div class="disk-container">
        <div class="disk-outer"></div>
        <div class="disk-vinyl" id="diskVinyl">
          <div class="disk-label">
            <div class="track-name" id="diskTrackName">—</div>
            <div class="disk-center-dot"></div>
          </div>
        </div>
        <div class="disk-shine"></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="time-display">
          <span id="timeElapsed">0:00</span> / <span id="timeDuration">0:00</span>
        </div>
        <div class="countdown" id="countdown"></div>
      </div>
    </div>

    <!-- Tracks col -->
    <div class="tracks-col">
      <div class="tracks-header">
        <div class="tracks-label">— Tracks —</div>
        <button class="add-btn" id="addBtn">
          <span class="add-btn-icon">+</span>
          <span class="add-btn-text">Add</span>
        </button>
      </div>
      <div class="tracks-scroll" id="tracksScroll">
        <div class="no-tracks-hint" id="noTracksHint">Tap + to add tracks</div>
      </div>
    </div>

  </div>

  <div class="h-divider"></div>

  <!-- Big stomp buttons -->
  <div class="bottom-section">
    <div class="stomp-btn" id="stompBtn">
      <div class="stomp-btn-outer"></div>
      <div class="stomp-btn-inner">
        <div class="stomp-icon" id="stompIcon">▶</div>
        <div class="stomp-info">
          <div class="led" id="mainLed"></div>
          <div class="stomp-label" id="stompLabel">PLAY</div>
        </div>
      </div>
    </div>

    <div class="stomp-btn" id="restartBtn">
      <div class="stomp-btn-outer"></div>
      <div class="stomp-btn-inner">
        <div class="stomp-icon">⏮</div>
        <div class="stomp-info">
          <div class="led" id="restartLed"></div>
          <div class="stomp-label">START</div>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.aac,.ogg,.flac" multiple>
</div>

<script>
  const audio = new Audio();
  audio.loop = false;

  let tracks = [];
  let currentTrack = -1;
  let isPlaying = false;
  let loopTimer = null;
  let countdownInterval = null;

  const stompBtn      = document.getElementById('stompBtn');
  const restartBtn    = document.getElementById('restartBtn');
  const stompIcon     = document.getElementById('stompIcon');
  const stompLabel    = document.getElementById('stompLabel');
  const mainLed       = document.getElementById('mainLed');
  const restartLed    = document.getElementById('restartLed');
  const diskVinyl     = document.getElementById('diskVinyl');
  const diskTrackName = document.getElementById('diskTrackName');
  const progressFill  = document.getElementById('progressFill');
  const timeElapsed   = document.getElementById('timeElapsed');
  const timeDuration  = document.getElementById('timeDuration');
  const tracksScroll  = document.getElementById('tracksScroll');
  const addBtn        = document.getElementById('addBtn');
  const fileInput     = document.getElementById('fileInput');
  const noTracksHint  = document.getElementById('noTracksHint');
  const countdownEl   = document.getElementById('countdown');

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function clearLoopTimer() {
    if (loopTimer)          { clearTimeout(loopTimer);       loopTimer = null; }
    if (countdownInterval)  { clearInterval(countdownInterval); countdownInterval = null; }
    countdownEl.textContent = '';
    countdownEl.classList.remove('visible');
  }

  function startCountdown() {
    clearLoopTimer();
    let secs = 5;
    countdownEl.textContent = `LOOP IN ${secs}...`;
    countdownEl.classList.add('visible');
    countdownInterval = setInterval(() => {
      secs--;
      if (secs > 0) {
        countdownEl.textContent = `LOOP IN ${secs}...`;
      } else {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
    }, 1000);
    loopTimer = setTimeout(() => {
      clearLoopTimer();
      if (currentTrack >= 0) {
        audio.currentTime = 0;
        audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
      }
    }, 5000);
  }

  function updateUI() {
    stompIcon.textContent  = isPlaying ? '⏸' : '▶';
    stompLabel.textContent = isPlaying ? 'PAUSE' : 'PLAY';
    mainLed.classList.toggle('on', isPlaying);
    diskVinyl.classList.toggle('spinning', isPlaying);
    document.querySelectorAll('.track-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentTrack);
    });
    diskTrackName.textContent = currentTrack >= 0 ? tracks[currentTrack].name : '—';
  }

  function loadTrack(index, cancelLoop) {
    if (cancelLoop !== false) clearLoopTimer();
    if (index < 0 || index >= tracks.length) return;
    currentTrack = index;
    audio.src = tracks[index].url;
    audio.load();
    timeDuration.textContent = '0:00';
    timeElapsed.textContent  = '0:00';
    progressFill.style.width = '0%';
    updateUI();
  }

  function playPause() {
    if (currentTrack < 0 && tracks.length > 0) loadTrack(0);
    if (currentTrack < 0) return;
    if (loopTimer) {
      clearLoopTimer();
      audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
      return;
    }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
    } else {
      audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
      isPlaying = true;
    }
    updateUI();
  }

  function restartTrack() {
    clearLoopTimer();
    if (currentTrack < 0 && tracks.length > 0) loadTrack(0);
    if (currentTrack < 0) return;
    audio.currentTime = 0;
    restartLed.classList.add('on');
    setTimeout(() => restartLed.classList.remove('on'), 300);
    if (!isPlaying) {
      audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
      isPlaying = true;
      updateUI();
    }
  }

  stompBtn.addEventListener('click', playPause);
  restartBtn.addEventListener('click', restartTrack);

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeElapsed.textContent  = fmt(audio.currentTime);
      timeDuration.textContent = fmt(audio.duration);
    }
  });

  audio.addEventListener('ended', () => {
    isPlaying = false;
    updateUI();
    startCountdown();
  });

  addBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const url  = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^.]+$/, '');
      const idx  = tracks.length;
      tracks.push({ name, url });
      addTrackButton(name, idx);
    });
    fileInput.value = '';
    noTracksHint.style.display = 'none';
    if (currentTrack < 0 && tracks.length > 0) loadTrack(0);
  });

  function addTrackButton(name, index) {
    const btn = document.createElement('button');
    btn.className = 'track-btn';
    btn.innerHTML = `
      <div class="track-led"></div>
      <div class="track-num">T${index + 1}</div>
      <div class="track-btn-name">${name}</div>
    `;
    btn.addEventListener('click', () => {
      if (currentTrack === index) {
        playPause();
      } else {
        clearLoopTimer();
        const wasPlaying = isPlaying;
        if (isPlaying) { audio.pause(); isPlaying = false; }
        loadTrack(index, false);
        if (wasPlaying) {
          audio.play().then(() => { isPlaying = true; updateUI(); }).catch(() => {});
          isPlaying = true;
        }
        updateUI();
      }
    });
    tracksScroll.appendChild(btn);
  }
</script>
</body>
</html>
